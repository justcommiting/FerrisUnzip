name: rust-clippy analyze

on:
  push:
    branches: [ "latest_branch" ]
  pull_request:
    branches: [ "latest_branch" ]
  schedule:
    - cron: "0 12 * * *" 

jobs:
  clippy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy
          rustc -V && cargo -V

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy (workspace, all targets)
        run: |
          cargo clippy --workspace --all-targets --all-features --message-format=json \
            | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
        continue-on-error: true  # set to false and add `-- -D warnings` to fail PRs

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true
